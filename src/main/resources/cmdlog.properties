# SQLite database file name; the file will be placed under the plugin data directory
# For example: plugins/cmd-log/data.db
database.file=data.db

# Number of days to retain logs
# Cleanup runs once on startup, then automatically once per day for expired records
retention.days=365

# Default number of results returned by normal queries
query.default-limit=100

# Maximum number of results allowed for queries
query.max-limit=500

# Default number of results returned when running /cmdlog directly
query.default-recent-limit=10

# Whether to enable --regex queries
query.enable-regex=true

# Additional chat prefixes to record, separated by English commas
# Leave empty to disable additional prefixes
# For example: !!,##
query.custom-cmd-prefixes=

# Command prefixes that should not be recorded, separated by English commas
# Leave empty to disable the blacklist
# Matched by command word, for example /setblock matches /setblock and /setblock xxx
# If a prefix does not start with /, it will be normalized to /prefix
# For example: /setblock,/summon
record.ignore-cmd-prefixes=
